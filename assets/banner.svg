<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Felix Savedra — Vedra Research: simulation and analytics for complex systems">
  <defs>
    <radialGradient id="nebCrimson" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#B23A3A" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#B23A3A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#B23A3A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C6A15B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C6A15B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="#0A0A0B"/>

  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 4 -3; 0 0" dur="38s" repeatCount="indefinite"/>
    <ellipse cx="1080" cy="150" rx="220" ry="150" fill="url(#nebCrimson)"/>
    <ellipse cx="1000" cy="108" rx="120" ry="92"  fill="url(#nebGold)"/>
  </g>

  <g>
    <circle cx="905"  cy="70"  r="1.3" fill="#E8E3D6" opacity="0.85"/>
    <circle cx="1230" cy="140" r="1.2" fill="#E8E3D6" opacity="0.8"/>
    <circle cx="1130" cy="250" r="1.1" fill="#E8E3D6" opacity="0.75"/>
    <circle cx="1180" cy="60"  r="1.4" fill="#E8E3D6" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.25;0.85" dur="4.5s" begin="-1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960"  cy="235" r="1.3" fill="#E8E3D6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5.3s" begin="-2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1015" cy="55"  r="1.0" fill="#E8E3D6" opacity="0.75">
      <animate attributeName="opacity" values="0.75;0.2;0.75" dur="3.8s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880"  cy="130" r="0.9" fill="#8C8C93" opacity="0.5"/>
    <circle cx="1255" cy="200" r="1.0" fill="#8C8C93" opacity="0.5"/>
    <circle cx="1200" cy="95"  r="0.9" fill="#8C8C93" opacity="0.45"/>
    <circle cx="1090" cy="40"  r="0.8" fill="#8C8C93" opacity="0.45"/>
    <circle cx="890"  cy="210" r="0.8" fill="#8C8C93" opacity="0.45"/>
    <circle cx="1160" cy="200" r="0.7" fill="#8C8C93" opacity="0.4"/>
    <circle cx="1215" cy="175" r="0.6" fill="#8C8C93" opacity="0.4"/>
    <circle cx="925"  cy="255" r="0.7" fill="#8C8C93" opacity="0.4"/>
    <circle cx="1060" cy="266" r="0.8" fill="#8C8C93" opacity="0.4"/>
    <circle cx="940"  cy="180" r="0.8" fill="#8C8C93" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.12;0.5" dur="6s" begin="-3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1240" cy="250" r="0.9" fill="#8C8C93" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.12;0.5" dur="5.6s" begin="-1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="985"  cy="120" r="0.7" fill="#8C8C93" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="4.2s" begin="-3.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(1080 152) rotate(-18)">
    <ellipse rx="150" ry="54" fill="none" stroke="#C6A15B" stroke-width="2" opacity="0.7"/>
    <ellipse rx="96" ry="34" fill="none" stroke="#C6A15B" stroke-width="2" opacity="0.4"/>
    <circle r="9" fill="none" stroke="#C6A15B" stroke-width="1.5" opacity="0.35"/>
    <circle r="4.5" fill="#E8E3D6"/>
    <circle r="4" fill="#B23A3A">
      <animateMotion dur="11.7s" begin="-4s" repeatCount="indefinite"
                     path="M150,0 A150,54 0 1,1 -150,0 A150,54 0 1,1 150,0"/>
    </circle>
    <circle r="3" fill="#B23A3A">
      <animateMotion dur="6s" begin="-1.5s" repeatCount="indefinite"
                     path="M96,0 A96,34 0 1,1 -96,0 A96,34 0 1,1 96,0"/>
    </circle>
  </g>

  <text x="80" y="150" fill="#E8E3D6"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="600">Felix Savedra</text>
  <text x="82" y="196" fill="#8C8C93"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="1">Vedra Research</text>

  <rect x="80" y="96" height="72" width="0" fill="#0A0A0B">
    <set attributeName="x" to="80" begin="0s" fill="freeze"/>
    <set attributeName="width" to="470" begin="0s" fill="freeze"/>
    <animate attributeName="x" calcMode="discrete"
             values="80;116;152;188;225;261;297;333;369;405;441;478;514;550"
             begin="0.6s" dur="1.3s" fill="freeze"/>
    <animate id="t1" attributeName="width" calcMode="discrete"
             values="470;434;398;362;325;289;253;217;181;145;109;72;36;0"
             begin="0.6s" dur="1.3s" fill="freeze"/>
  </rect>
  <rect x="82" y="176" height="30" width="0" fill="#0A0A0B">
    <set attributeName="x" to="82" begin="0s" fill="freeze"/>
    <set attributeName="width" to="220" begin="0s" fill="freeze"/>
    <animate attributeName="x" calcMode="discrete"
             values="82;98;113;129;145;161;176;192;208;224;239;255;271;286;302"
             begin="t1.end" dur="1.1s" fill="freeze"/>
    <animate id="t2" attributeName="width" calcMode="discrete"
             values="220;204;189;173;157;142;126;110;94;79;63;47;31;16;0"
             begin="t1.end" dur="1.1s" fill="freeze"/>
  </rect>

  <rect y="98" width="3" height="54" x="80" fill="#B23A3A" opacity="0">
    <animate attributeName="x" calcMode="discrete"
             values="80;116;152;188;225;261;297;333;369;405;441;478;514;550"
             begin="0.6s" dur="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.5s" repeatCount="indefinite" begin="0.6s" end="t1.end"/>
    <set attributeName="opacity" to="0" begin="t1.end" fill="freeze"/>
  </rect>
  <rect y="178" width="2" height="26" x="82" fill="#B23A3A" opacity="0">
    <animate attributeName="x" calcMode="discrete"
             values="82;98;113;129;145;161;176;192;208;224;239;255;271;286;302"
             begin="t1.end" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.5s" repeatCount="indefinite" begin="t1.end" end="t2.end"/>
    <set attributeName="opacity" to="0" begin="t2.end" fill="freeze"/>
  </rect>

  <g opacity="0">
    <set attributeName="opacity" to="0" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="t2.end" dur="0.6s" fill="freeze"/>
    <line x1="146" y1="222" x2="640" y2="222" stroke="#8C8C93" stroke-width="1" opacity="0.4"/>
    <line x1="82" y1="222" x2="146" y2="222" stroke="#B23A3A" stroke-width="2"/>
    <text x="82" y="252" fill="#8C8C93" opacity="0.75"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="0.5">Simulation &amp; analytics for complex systems</text>
  </g>
</svg>
