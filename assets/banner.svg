<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Felix Savedra — Vedra Research: simulation and analytics for complex systems">
  <defs>
    <!-- typewriter reveal clips: base width = full (static fallback shows text); set to 0 at load, then grow -->
    <clipPath id="clip1">
      <rect x="80" y="96" height="72" width="470">
        <set attributeName="width" to="0" begin="0s" fill="freeze"/>
        <animate id="t1" attributeName="width" calcMode="discrete"
                 values="0;36;72;108;145;181;217;253;289;325;361;398;434;470"
                 begin="0.6s" dur="1.3s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="82" y="176" height="30" width="220">
        <set attributeName="width" to="0" begin="0s" fill="freeze"/>
        <animate id="t2" attributeName="width" calcMode="discrete"
                 values="0;16;31;47;63;79;94;110;126;142;157;173;189;204;220"
                 begin="t1.end" dur="1.1s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Black 40% -->
  <rect width="1280" height="320" fill="#0A0A0B"/>

  <!-- Orbital motif (right) — gold rings (20%), bone star + crimson planets (10%).
       A real little system: central star with two planets; inner orbits faster than
       outer (Kepler: period ∝ a^1.5, so a 96→150 gives ~1.95× period). -->
  <g transform="translate(1080 152) rotate(-18)">
    <ellipse rx="150" ry="54" fill="none" stroke="#C6A15B" stroke-width="2" opacity="0.7"/>
    <ellipse rx="96" ry="34" fill="none" stroke="#C6A15B" stroke-width="2" opacity="0.4"/>
    <!-- central star: bone core + faint gold halo -->
    <circle r="9" fill="none" stroke="#C6A15B" stroke-width="1.5" opacity="0.35"/>
    <circle r="4.5" fill="#E8E3D6"/>
    <!-- outer planet (slower) -->
    <circle r="4" fill="#B23A3A">
      <animateMotion dur="11.7s" begin="-4s" repeatCount="indefinite"
                     path="M150,0 A150,54 0 1,1 -150,0 A150,54 0 1,1 150,0"/>
    </circle>
    <!-- inner planet (faster, smaller for depth) -->
    <circle r="3" fill="#B23A3A">
      <animateMotion dur="6s" begin="-1.5s" repeatCount="indefinite"
                     path="M96,0 A96,34 0 1,1 -96,0 A96,34 0 1,1 96,0"/>
    </circle>
  </g>

  <!-- Lockup (left) — name in bone, subtext in grey, normal case -->
  <text x="80" y="150" clip-path="url(#clip1)" fill="#E8E3D6"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="600">Felix Savedra</text>
  <text x="82" y="196" clip-path="url(#clip2)" fill="#8C8C93"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="1">Vedra Research</text>

  <!-- crimson typing carets (10%): hidden by default, blink + trail during typing -->
  <rect y="98" width="3" height="54" x="550" fill="#B23A3A" opacity="0">
    <animate attributeName="x" calcMode="discrete"
             values="80;116;152;188;225;261;297;333;369;405;441;478;514;550"
             begin="0.6s" dur="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.5s" repeatCount="indefinite" begin="0.6s" end="t1.end"/>
    <set attributeName="opacity" to="0" begin="t1.end" fill="freeze"/>
  </rect>
  <rect y="178" width="2" height="26" x="302" fill="#B23A3A" opacity="0">
    <animate attributeName="x" calcMode="discrete"
             values="82;98;113;129;145;161;176;192;208;224;239;255;271;286;302"
             begin="t1.end" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.5s" repeatCount="indefinite" begin="t1.end" end="t2.end"/>
    <set attributeName="opacity" to="0" begin="t2.end" fill="freeze"/>
  </rect>

  <!-- hairline + tagline — fade in after typing (static fallback: visible) -->
  <g opacity="1">
    <set attributeName="opacity" to="0" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" begin="t2.end" dur="0.6s" fill="freeze"/>
    <line x1="146" y1="222" x2="640" y2="222" stroke="#8C8C93" stroke-width="1" opacity="0.4"/>
    <line x1="82" y1="222" x2="146" y2="222" stroke="#B23A3A" stroke-width="2"/>
    <text x="82" y="252" fill="#8C8C93" opacity="0.75"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="0.5">Simulation &amp; analytics for complex systems</text>
  </g>
</svg>
