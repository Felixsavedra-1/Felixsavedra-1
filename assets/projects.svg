<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Projects — Vedra Research: VR-01 Cancer Research Tool, VR-02 Vero - Wealth Management CLI, VR-03 Orbital Mechanics Engine, VR-04 Red Bull Racing F1 Performance Analytics, VR-05 Red Bull Racing F1 OPEX Analytics" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
